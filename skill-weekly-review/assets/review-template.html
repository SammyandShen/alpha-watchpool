<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>假设复核周报 · <!--FILL:DATE--></title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#e6edf3; --dim:#8b949e;
          --green:#3fb950; --red:#f85149; --amber:#d29922; --blue:#58a6ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
         line-height:1.7; max-width:860px; margin:0 auto; padding:32px 20px 80px; }
  h1 { font-size:1.5em; margin-bottom:4px; }
  h2 { font-size:1.15em; margin:36px 0 12px; padding-bottom:6px; border-bottom:1px solid var(--border); color:var(--blue); }
  h3 { font-size:1em; margin:20px 0 8px; }
  .meta { color:var(--dim); font-size:.85em; margin-bottom:24px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px 20px; margin:12px 0; }
  table { width:100%; border-collapse:collapse; font-size:.9em; margin:12px 0; }
  th,td { padding:8px 10px; text-align:left; border-bottom:1px solid var(--border); }
  th { color:var(--dim); font-weight:600; font-size:.85em; }
  .up { color:var(--green); } .down { color:var(--red); } .flat { color:var(--dim); }
  .badge { display:inline-block; padding:1px 8px; border-radius:10px; font-size:.78em; border:1px solid var(--border); }
  .badge.observing { color:var(--blue); border-color:var(--blue); }
  .badge.confirmed { color:var(--green); border-color:var(--green); }
  .badge.falsified { color:var(--red); border-color:var(--red); }
  .badge.expired { color:var(--dim); }
  .badge.promoted { color:var(--amber); border-color:var(--amber); }
  .disclaimer { margin-top:48px; padding:14px 18px; border:1px solid var(--border); border-radius:10px;
                color:var(--dim); font-size:.82em; }
  a { color:var(--blue); text-decoration:none; }
  .kpi-row { display:flex; gap:12px; flex-wrap:wrap; margin:16px 0; }
  .kpi { flex:1; min-width:140px; background:var(--card); border:1px solid var(--border); border-radius:10px;
         padding:12px 16px; }
  .kpi .v { font-size:1.4em; font-weight:700; }
  .kpi .k { color:var(--dim); font-size:.8em; }
</style>
</head>
